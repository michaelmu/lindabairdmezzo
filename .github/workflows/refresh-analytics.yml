name: Refresh Analytics Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * *'

permissions:
  id-token: write
  contents: write
  actions: write

concurrency:
  group: refresh-analytics
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: github-actions-lindabairdmezzo-analytics-refresh

      - name: Export analytics JSON
        run: python3 tools/export_analytics_json.py

      - name: Commit analytics snapshot
        id: commit
        run: |
          set -euo pipefail
          if git diff --quiet -- content/analytics; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/analytics
          git commit -m "refresh analytics snapshot"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger GitHub Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main

      - name: Trigger S3 deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-s3.yml --ref main
