name: Deploy GitHub Pages (staging + prod)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - staging

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (staging)
        if: github.ref == 'refs/heads/staging'
        env:
          PATH_PREFIX: /lindabairdmezzo/staging/
        run: npm run build

      - name: Build (prod)
        if: github.ref == 'refs/heads/main'
        env:
          PATH_PREFIX: /lindabairdmezzo/
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: _site
          # Keep staging + prod side-by-side (do not wipe existing content)
          keep_files: true
          destination_dir: ${{ github.ref == 'refs/heads/staging' && 'staging' || '' }}
